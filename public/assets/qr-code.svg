<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="white"/>
  
  <!-- QR Code Pattern (Placeholder) -->
  <g fill="#000">
    <!-- Top-left position marker -->
    <rect x="20" y="20" width="80" height="80"/>
    <rect x="30" y="30" width="60" height="60" fill="white"/>
    <rect x="40" y="40" width="40" height="40"/>
    
    <!-- Top-right position marker -->
    <rect x="300" y="20" width="80" height="80"/>
    <rect x="310" y="30" width="60" height="60" fill="white"/>
    <rect x="320" y="40" width="40" height="40"/>
    
    <!-- Bottom-left position marker -->
    <rect x="20" y="300" width="80" height="80"/>
    <rect x="30" y="310" width="60" height="60" fill="white"/>
    <rect x="40" y="320" width="40" height="40"/>
    
    <!-- Central pattern -->
    <rect x="120" y="120" width="20" height="20"/>
    <rect x="160" y="120" width="20" height="20"/>
    <rect x="200" y="120" width="20" height="20"/>
    <rect x="240" y="120" width="20" height="20"/>
    
    <rect x="120" y="160" width="20" height="20"/>
    <rect x="180" y="160" width="40" height="40"/>
    <rect x="260" y="160" width="20" height="20"/>
    
    <rect x="140" y="200" width="20" height="20"/>
    <rect x="200" y="200" width="20" height="20"/>
    <rect x="240" y="200" width="20" height="20"/>
    
    <rect x="120" y="240" width="20" height="20"/>
    <rect x="160" y="240" width="20" height="20"/>
    <rect x="220" y="240" width="20" height="20"/>
    <rect x="260" y="240" width="20" height="20"/>
    
    <!-- Timing patterns -->
    <rect x="120" y="40" width="20" height="20"/>
    <rect x="160" y="40" width="20" height="20"/>
    <rect x="200" y="40" width="20" height="20"/>
    <rect x="240" y="40" width="20" height="20"/>
    
    <rect x="40" y="120" width="20" height="20"/>
    <rect x="40" y="160" width="20" height="20"/>
    <rect x="40" y="200" width="20" height="20"/>
    <rect x="40" y="240" width="20" height="20"/>
  </g>
  
  <!-- Text overlay -->
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">
    Replace with actual payment QR
  </text>
</svg>